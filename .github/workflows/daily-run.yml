name: Daily MLB-LAB Run

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-mlb-lab:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run MLB Lab
      run: python3 scripts/mlb_lab_runner.py
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reports/
        git commit -m "Daily run $(date +%Y-%m-%d)" || echo "No changes"
        git push
