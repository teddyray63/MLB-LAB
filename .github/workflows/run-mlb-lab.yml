name: Run MLB-LAB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run MLB-LAB
        run: python scripts/mlb_lab_runner.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Run MLB-LAB automated report" || echo "No changes"
          git pull --rebase --autostash origin main
          git push origin main
